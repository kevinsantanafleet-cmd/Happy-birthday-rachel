<!doctype html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Phase 1 | Birthday Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="./dist/output.css" rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .text-glow-primary {
      text-shadow: 0 0 20px rgba(255, 138, 169, 0.5);
    }
    .safe-top {
      padding-top: calc(env(safe-area-inset-top, 0px) + 1rem);
    }
    .safe-bottom {
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
    }
    .ios-tap {
      min-height: 44px;
      min-width: 44px;
    }
    html {
      -webkit-text-size-adjust: 100%;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-x-hidden selection:bg-tertiary selection:text-on-tertiary">
  <main class="relative">
    <section class="relative flex min-h-[100svh] flex-col justify-center overflow-hidden px-4 max-[375px]:px-3 sm:px-6 lg:px-24 safe-top safe-bottom">
      <div class="pointer-events-none absolute right-[-8%] top-20 select-none opacity-20 max-[375px]:right-[-12%] sm:right-[-4%] sm:top-32">
        <h2 class="rotate-12 font-headline text-[8rem] font-black leading-none tracking-tighter text-secondary max-[375px]:text-[6.25rem] sm:text-[13rem] md:text-[18rem]">23</h2>
      </div>

      <div class="z-10 w-full max-w-6xl">
        <span class="mb-4 inline-block bg-primary px-3 py-1 font-headline text-xs font-bold uppercase tracking-widest text-on-primary sm:px-4 sm:text-base">Phase 1</span>
        <h1 class="break-words font-headline text-5xl font-black uppercase leading-[0.84] tracking-tighter text-glow-primary max-[375px]:text-[2.7rem] sm:text-6xl md:text-7xl lg:text-[8rem]">
          Happy<br />Birthday<br /><span class="text-tertiary">Rachel</span>
        </h1>
        <div class="mt-8 flex flex-col items-start gap-6 max-[375px]:mt-6 max-[375px]:gap-4 sm:mt-12 sm:gap-8 md:flex-row">
          <p class="max-w-2xl font-headline text-xl font-medium leading-tight text-on-surface-variant max-[375px]:text-base sm:text-2xl md:text-3xl">
            This is not only your birthday but also the first day we met each other WKWKWK.
          </p>
          <a href="./spotify-title.html" aria-label="Go to phase 2" class="ios-tap inline-flex flex-shrink-0 items-center justify-center bg-secondary p-3 text-on-secondary transition hover:-rotate-3 active:scale-95 max-[375px]:p-2.5 sm:p-4">
            <span class="material-symbols-outlined text-4xl sm:text-5xl" style='font-variation-settings: "FILL" 1;'>play_arrow</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <footer class="w-full bg-[#1a1a1a] px-4 py-6 safe-bottom">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">
      <span>Phase 1 / 5</span>
      <a href="./spotify-title.html" class="text-secondary">Next: Sonic Journey</a>
    </div>
  </footer>
</body>
</html>
