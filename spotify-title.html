<!doctype html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spotify Title</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="./dist/output.css" rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .safe-top {
      padding-top: calc(env(safe-area-inset-top, 0px) + 1rem);
    }
    .safe-bottom {
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
    }
    .ios-tap {
      min-height: 44px;
      min-width: 44px;
    }
    html {
      -webkit-text-size-adjust: 100%;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-x-hidden selection:bg-tertiary selection:text-on-tertiary">
  <main class="px-4 py-6 max-[375px]:px-3 max-[375px]:py-4 sm:px-6 sm:py-10 lg:px-24 safe-top safe-bottom">
    <section class="relative flex min-h-[100svh] items-center">
      <div class="relative flex min-h-[82svh] w-full flex-col justify-center overflow-hidden bg-surface-container p-6 max-[375px]:min-h-[86svh] max-[375px]:p-4 sm:p-12">
        <div class="absolute left-4 top-4 h-6 w-6 bg-primary sm:h-8 sm:w-8"></div>
        <div class="absolute bottom-4 right-4 h-8 w-8 rounded-full bg-secondary sm:h-12 sm:w-12"></div>

        <div class="relative z-10 max-w-3xl">
          <p class="mb-3 inline-block bg-tertiary px-3 py-1 font-headline text-xs font-bold uppercase tracking-widest text-on-tertiary sm:text-sm">
            Sonic Journey
          </p>
          <p class="mb-8 font-body text-xl font-medium leading-relaxed text-on-surface max-[375px]:mb-6 max-[375px]:text-lg sm:text-2xl md:text-3xl">
            I actually do not know what your favorite songs are, so these are my best guesses based on our hangouts.
          </p>

          <div class="flex flex-wrap items-center gap-3">
            <a href="./spotify-grid.html" class="ios-tap inline-flex items-center gap-2 bg-secondary px-4 py-2 font-body text-xs font-semibold uppercase tracking-wide text-on-secondary transition hover:scale-105 active:scale-95 sm:text-sm">
              <span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1; font-size: 18px;'>music_note</span>
              <span>My guesses</span>
            </a>
            <a href="./index.html" class="ios-tap inline-flex items-center gap-2 bg-surface px-4 py-2 font-body text-xs font-semibold uppercase tracking-wide text-on-surface transition hover:scale-105 active:scale-95 sm:text-sm">
              <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
              <span>Back</span>
            </a>
          </div>
        </div>

        <div class="pointer-events-none absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 24px 24px;"></div>
      </div>
    </section>
  </main>

  <footer class="w-full bg-[#1a1a1a] px-4 py-6 safe-bottom">
    <div class="mx-auto flex max-w-6xl items-center justify-end gap-4 text-[10px] uppercase tracking-[0.2em] text-on-surface-variant">
      <a href="./spotify-grid.html" class="text-secondary">Next: Spotify Grid</a>
    </div>
  </footer>
</body>
</html>
